id: openlst_openlst_mod
label: OpenLST Frame+Encode
category: '[openlst]'

templates:
  imports: from gnuradio import openlst
  make: openlst.openlst_mod(client_format=${client_format}, fec=${fec}, whitening=${whitening}, bitrate=${bitrate}, max_latency=${max_latency}, debug=${debug})

parameters:
- id: fec
  label: Enable FEC
  dtype: bool
  default: true
- id: whitening
  label: Enable data whitening
  dtype: bool
  default: true
- id: bitrate
  label: Target bitrate
  dtype: float
  default: 7415.77
- id: max_latency
  label: Target latency (sec)
  dtype: float
  default: 0.1
- id: client_format
  label: Client message format
  dtype: enum
  options: [ "'CLIENT_PACKET'", "'RAW'" ]
  option_labels: [ CLIENT_PACKET, RAW ]
  default: "'CLIENT_PACKET'"
- id: debug
  label: Debug
  dtype: enum
  options: ['True', 'False']
  option_labels: ['Enabled', 'Disabled']
  default: 'False'

inputs:
- label: message
  domain: message

outputs:
- label: out
  dtype: byte
- label: debug
  domain: message
  optional: true

file_format: 1
